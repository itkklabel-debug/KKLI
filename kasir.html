<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('style'); ?>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f6fa;
      overflow: hidden;
      height: 100vh;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 15px rgba(231,76,60,0.3);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 50px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-left .brand {
      font-size: 20px;
      font-weight: 700;
    }
    .header-left .branch-badge {
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-right .user-info {
      font-size: 13px;
      opacity: 0.9;
    }
    .btn-logout {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
    }
    .btn-logout:hover {
      background: rgba(255,255,255,0.3);
    }
    .btn-owner-link {
      background: #f1c40f;
      color: #2c3e50;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-owner-link:hover {
      background: #f39c12;
    }
    
    /* Main Layout */
    .main-container {
      display: flex;
      height: calc(100vh - 74px);
      margin-top: 74px;
    }
    
    /* Menu Panel */
    .menu-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      padding-bottom: 80px;
    }
    .menu-panel::-webkit-scrollbar {
      width: 6px;
    }
    .menu-panel::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 3px;
    }
    .menu-search {
      margin-bottom: 16px;
    }
    .menu-search input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #ecf0f1;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    .menu-search input:focus {
      border-color: #e74c3c;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 14px;
    }
    .menu-card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .menu-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      border-color: #e74c3c;
    }
    .menu-card:active {
      transform: scale(0.97);
    }
    .menu-card-img {
      width: 100%;
      height: 100px;
      background: linear-gradient(135deg, #ffeaa7, #fab1a0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      overflow: hidden;
    }
    .menu-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .menu-card-info {
      padding: 10px 12px;
    }
    .menu-card-name {
      font-size: 13px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .menu-card-price {
      font-size: 14px;
      font-weight: 700;
      color: #e74c3c;
    }
    
    /* Cart Panel */
    .cart-panel {
      width: 360px;
      background: white;
      border-left: 1px solid #ecf0f1;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 20px rgba(0,0,0,0.05);
    }
    .cart-header {
      padding: 16px 20px;
      border-bottom: 1px solid #ecf0f1;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-header h3 {
      margin: 0;
      font-size: 16px;
      color: #2c3e50;
    }
    .cart-count {
      background: #e74c3c;
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 10px 20px;
    }
    .cart-items::-webkit-scrollbar {
      width: 4px;
    }
    .cart-items::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 2px;
    }
    .cart-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f5f6fa;
      gap: 10px;
    }
    .cart-item-info {
      flex: 1;
    }
    .cart-item-name {
      font-size: 13px;
      font-weight: 600;
      color: #2c3e50;
    }
    .cart-item-price {
      font-size: 12px;
      color: #7f8c8d;
    }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .qty-btn.minus {
      background: #fdeaea;
      color: #e74c3c;
    }
    .qty-btn.plus {
      background: #eafaf1;
      color: #27ae60;
    }
    .qty-btn:hover {
      transform: scale(1.1);
    }
    .qty-value {
      font-weight: 700;
      font-size: 14px;
      min-width: 20px;
      text-align: center;
    }
    .cart-empty {
      text-align: center;
      padding: 40px 20px;
      color: #bdc3c7;
    }
    .cart-empty-icon {
      font-size: 50px;
      margin-bottom: 10px;
    }
    
    /* Cart Footer */
    .cart-footer {
      padding: 16px 20px;
      border-top: 2px solid #ecf0f1;
      background: #fafbfc;
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .cart-total-label {
      font-size: 14px;
      color: #7f8c8d;
    }
    .cart-total-value {
      font-size: 22px;
      font-weight: 800;
      color: #e74c3c;
    }
    .payment-btns {
      display: flex;
      gap: 10px;
    }
    .btn-pay {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-pay:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-cash {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
    }
    .btn-cash:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(39,174,96,0.4);
    }
    .btn-qris {
      background: linear-gradient(135deg, #2980b9, #3498db);
      color: white;
    }
    .btn-qris:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(41,128,185,0.4);
    }
    .btn-clear {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: #fdeaea;
      color: #e74c3c;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-clear:hover {
      background: #e74c3c;
      color: white;
    }
    
    /* Success Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-icon {
      font-size: 60px;
      margin-bottom: 15px;
    }
    .modal h3 {
      color: #2c3e50;
      margin: 0 0 10px;
      font-size: 20px;
    }
    .modal p {
      color: #7f8c8d;
      margin: 0 0 20px;
    }
    .modal-btns {
      display: flex;
      gap: 10px;
    }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .modal-btn.primary {
      background: #e74c3c;
      color: white;
    }
    .modal-btn.secondary {
      background: #ecf0f1;
      color: #2c3e50;
    }
    
    /* Receipt Print */
    .receipt-container {
      display: none;
    }
    
    @media print {
      body * {
        visibility: hidden;
      }
      .receipt-container, .receipt-container * {
        visibility: visible;
      }
      .receipt-container {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 58mm;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        padding: 5mm;
      }
      .receipt-container .receipt-header {
        text-align: center;
        border-bottom: 1px dashed #000;
        padding-bottom: 5px;
        margin-bottom: 5px;
      }
      .receipt-container .receipt-items {
        border-bottom: 1px dashed #000;
        padding-bottom: 5px;
        margin-bottom: 5px;
      }
      .receipt-container .receipt-item {
        display: flex;
        justify-content: space-between;
        margin: 2px 0;
      }
      .receipt-container .receipt-total {
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        margin-top: 5px;
      }
      .receipt-container .receipt-footer {
        text-align: center;
        margin-top: 8px;
        font-size: 10px;
      }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }
      .cart-panel {
        width: 100%;
        max-height: 45vh;
        border-left: none;
        border-top: 2px solid #ecf0f1;
      }
      .menu-panel {
        padding-bottom: 20px;
      }
      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
      }
      .header-left .brand {
        font-size: 16px;
      }
      .header-left .branch-badge {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="brand">🥟 Dimsum Enak</span>
      <span class="branch-badge">📍 <?= cabang ?></span>
    </div>
    <div class="header-right">
      <span class="user-info">👤 <?= username ?></span>
      <? if (role === 'owner') { ?>
        <button class="btn-owner-link" onclick="goToOwner()">📊 Dashboard</button>
      <? } ?>
      <button class="btn-logout" onclick="handleLogout()">Keluar</button>
    </div>
  </div>
  
  <!-- Main -->
  <div class="main-container">
    <!-- Menu Panel -->
    <div class="menu-panel">
      <div class="menu-search">
        <input type="text" id="searchMenu" placeholder="🔍 Cari menu..." oninput="filterMenu()">
      </div>
      <div class="menu-grid" id="menuGrid">
        <!-- Menu cards loaded here -->
      </div>
    </div>
    
    <!-- Cart Panel -->
    <div class="cart-panel">
      <div class="cart-header">
        <h3>🛒 Keranjang</h3>
        <span class="cart-count" id="cartCount">0</span>
      </div>
      <div class="cart-items" id="cartItems">
        <div class="cart-empty">
          <div class="cart-empty-icon">🛒</div>
          <p>Keranjang kosong</p>
          <p style="font-size:12px;">Ketuk menu untuk menambah</p>
        </div>
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span class="cart-total-label">Total</span>
          <span class="cart-total-value" id="cartTotal">Rp 0</span>
        </div>
        <div class="payment-btns">
          <button class="btn-pay btn-cash" id="btnCash" onclick="processPayment('Cash')" disabled>💵 Cash</button>
          <button class="btn-pay btn-qris" id="btnQris" onclick="processPayment('QRIS')" disabled>📱 QRIS</button>
        </div>
        <button class="btn-clear" onclick="clearCart()">🗑️ Kosongkan Keranjang</button>
      </div>
    </div>
  </div>
  
  <!-- Success Modal -->
  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <div class="modal-icon">✅</div>
      <h3>Pembayaran Berhasil!</h3>
      <p id="modalInfo"></p>
      <div class="modal-btns">
        <button class="modal-btn secondary" onclick="closeModal()">Tutup</button>
        <button class="modal-btn primary" onclick="printReceipt()">🖨️ Cetak Struk</button>
      </div>
    </div>
  </div>
  
  <!-- Receipt (hidden, for print) -->
  <div class="receipt-container" id="receiptContainer">
    <div class="receipt-header">
      <strong>DIMSUM ENAK</strong><br>
      <span id="receiptBranch"><?= cabang ?></span><br>
      <span id="receiptDate"></span><br>
      <span>Kasir: <?= username ?></span>
    </div>
    <div class="receipt-items" id="receiptItems"></div>
    <div class="receipt-total">
      <span>TOTAL</span>
      <span id="receiptTotal"></span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:3px;">
      <span>Bayar:</span>
      <span id="receiptMethod"></span>
    </div>
    <div class="receipt-footer">
      ================================<br>
      Terima kasih!<br>
      Selamat menikmati 🥟
    </div>
  </div>

  <script>
    const TOKEN = '<?= token ?>';
    const USERNAME = '<?= username ?>';
    const CABANG = '<?= cabang ?>';
    
    let menuData = [];
    let cart = [];
    let lastTransaction = null;
    
    // === INIT ===
    document.addEventListener('DOMContentLoaded', function() {
      loadMenu();
    });
    
    // Auto refresh menu every 60 seconds
    setInterval(loadMenu, 60000);
    
    // === MENU ===
    function loadMenu() {
      google.script.run
        .withSuccessHandler(function(data) {
          menuData = data;
          renderMenu(data);
        })
        .withFailureHandler(function(err) {
          console.error('Load menu error:', err);
        })
        .getMenu();
    }
    
    function renderMenu(items) {
      const grid = document.getElementById('menuGrid');
      grid.innerHTML = '';
      
      items.forEach(function(item) {
        const card = document.createElement('div');
        card.className = 'menu-card';
        card.onclick = function() { addToCart(item); };
        
        let imgContent;
        if (item.gambar && item.gambar.length > 5) {
          imgContent = '<img src="' + item.gambar + '" alt="' + item.nama + '">';
        } else {
          imgContent = '🥟';
        }
        
        card.innerHTML = 
          '<div class="menu-card-img">' + imgContent + '</div>' +
          '<div class="menu-card-info">' +
            '<div class="menu-card-name">' + item.nama + '</div>' +
            '<div class="menu-card-price">Rp ' + formatNumber(item.harga) + '</div>' +
          '</div>';
        
        grid.appendChild(card);
      });
    }
    
    function filterMenu() {
      const search = document.getElementById('searchMenu').value.toLowerCase();
      const filtered = menuData.filter(function(item) {
        return item.nama.toLowerCase().indexOf(search) !== -1;
      });
      renderMenu(filtered);
    }
    
    // === CART ===
    function addToCart(item) {
      const existing = cart.find(function(c) { return c.id === item.id; });
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ id: item.id, nama: item.nama, harga: item.harga, qty: 1 });
      }
      renderCart();
      // Visual feedback
      showToast(item.nama + ' ditambahkan');
    }
    
    function removeFromCart(id) {
      cart = cart.filter(function(c) { return c.id !== id; });
      renderCart();
    }
    
    function updateQty(id, delta) {
      const item = cart.find(function(c) { return c.id === id; });
      if (item) {
        item.qty += delta;
        if (item.qty <= 0) {
          removeFromCart(id);
          return;
        }
      }
      renderCart();
    }
    
    function clearCart() {
      cart = [];
      renderCart();
    }
    
    function renderCart() {
      const container = document.getElementById('cartItems');
      const countEl = document.getElementById('cartCount');
      const totalEl = document.getElementById('cartTotal');
      const btnCash = document.getElementById('btnCash');
      const btnQris = document.getElementById('btnQris');
      
      if (cart.length === 0) {
        container.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Keranjang kosong</p><p style="font-size:12px;">Ketuk menu untuk menambah</p></div>';
        countEl.textContent = '0';
        totalEl.textContent = 'Rp 0';
        btnCash.disabled = true;
        btnQris.disabled = true;
        return;
      }
      
      let total = 0;
      let totalItems = 0;
      let html = '';
      
      cart.forEach(function(item) {
        const subtotal = item.harga * item.qty;
        total += subtotal;
        totalItems += item.qty;
        
        html += '<div class="cart-item">' +
          '<div class="cart-item-info">' +
            '<div class="cart-item-name">' + item.nama + '</div>' +
            '<div class="cart-item-price">Rp ' + formatNumber(item.harga) + ' × ' + item.qty + ' = Rp ' + formatNumber(subtotal) + '</div>' +
          '</div>' +
          '<div class="cart-item-qty">' +
            '<button class="qty-btn minus" onclick="updateQty(' + item.id + ', -1)">−</button>' +
            '<span class="qty-value">' + item.qty + '</span>' +
            '<button class="qty-btn plus" onclick="updateQty(' + item.id + ', 1)">+</button>' +
          '</div>' +
        '</div>';
      });
      
      container.innerHTML = html;
      countEl.textContent = totalItems;
      totalEl.textContent = 'Rp ' + formatNumber(total);
      btnCash.disabled = false;
      btnQris.disabled = false;
    }
    
    // === PAYMENT ===
    function processPayment(metode) {
      if (cart.length === 0) return;
      
      const total = cart.reduce(function(sum, item) { return sum + (item.harga * item.qty); }, 0);
      
      const btnCash = document.getElementById('btnCash');
      const btnQris = document.getElementById('btnQris');
      btnCash.disabled = true;
      btnQris.disabled = true;
      
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            lastTransaction = {
              items: cart.slice(),
              total: total,
              metode: metode,
              waktu: result.waktu
            };
            
            // Show success
            document.getElementById('modalInfo').textContent = 
              'Total: Rp ' + formatNumber(total) + ' | ' + metode + '\n' + result.waktu;
            document.getElementById('successModal').classList.add('show');
            
            // Prepare receipt
            prepareReceipt(lastTransaction);
            
            // Clear cart
            cart = [];
            renderCart();
          }
        })
        .withFailureHandler(function(err) {
          alert('Gagal menyimpan transaksi: ' + err.message);
          btnCash.disabled = false;
          btnQris.disabled = false;
        })
        .saveTransaction(cart, total, metode, USERNAME, CABANG);
    }
    
    // === RECEIPT ===
    function prepareReceipt(trx) {
      document.getElementById('receiptDate').textContent = trx.waktu;
      document.getElementById('receiptTotal').textContent = 'Rp ' + formatNumber(trx.total);
      document.getElementById('receiptMethod').textContent = trx.metode;
      
      let itemsHtml = '';
      trx.items.forEach(function(item) {
        const subtotal = item.harga * item.qty;
        itemsHtml += '<div class="receipt-item"><span>' + item.nama + ' x' + item.qty + '</span><span>Rp ' + formatNumber(subtotal) + '</span></div>';
      });
      document.getElementById('receiptItems').innerHTML = itemsHtml;
    }
    
    function printReceipt() {
      window.print();
    }
    
    // === MODAL ===
    function closeModal() {
      document.getElementById('successModal').classList.remove('show');
    }
    
    // === NAVIGATION ===
    function goToOwner() {
      google.script.run
        .withSuccessHandler(function(baseUrl) {
          window.top.location.href = baseUrl + '?page=owner&token=' + TOKEN;
        })
        .getWebAppUrl();
    }
    
    function handleLogout() {
      google.script.run
        .withSuccessHandler(function() {
          google.script.run
            .withSuccessHandler(function(baseUrl) {
              window.top.location.href = baseUrl;
            })
            .getWebAppUrl();
        })
        .logout(TOKEN);
    }
    
    // === UTILITIES ===
    function formatNumber(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }
    
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2c3e50;color:white;padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;animation:popIn 0.3s ease;';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 1500);
    }
  </script>
</body>
</html>
