<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <?!= include('style'); ?>
  <style>
    @media print {
      body * { visibility:hidden; }
      .receipt-print, .receipt-print * { visibility:visible; }
      .receipt-print { position:absolute;top:0;left:0;width:58mm;font-family:'Courier New',monospace;font-size:11px;padding:5mm; }
    }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

  <!-- TOP HEADER -->
  <header class="bg-gradient-to-r from-primary-500 to-primary-600 text-white px-4 py-3 flex items-center justify-between shadow-lg shadow-primary-500/20 flex-shrink-0 safe-top z-50">
    <div class="flex items-center gap-2">
      <span class="text-lg font-bold">🥟 Dimsum Enak</span>
      <span class="hidden sm:inline-block bg-white/20 text-[10px] font-semibold px-2 py-0.5 rounded-full">📍 <?= cabang ?></span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-xs opacity-80 hidden sm:block">👤 <?= username ?></span>
      <? if (role === 'owner') { ?>
      <button onclick="goToOwner()" class="bg-accent-400 text-gray-800 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-accent-300 transition">📊</button>
      <? } ?>
      <button onclick="handleLogout()" class="bg-white/20 text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-white/30 transition">Keluar</button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">

    <!-- MENU PANEL -->
    <div class="flex-1 overflow-y-auto p-3 pb-4" id="menuPanel">
      <!-- Search -->
      <div class="sticky top-0 z-10 pb-3">
        <input type="text" id="searchMenu" placeholder="🔍 Cari menu..." oninput="filterMenu()"
          class="w-full px-4 py-3 bg-white border-2 border-gray-100 rounded-xl text-sm shadow-sm focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 outline-none transition-all">
      </div>
      <!-- Grid -->
      <div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-2.5" id="menuGrid"></div>
    </div>

    <!-- CART PANEL (slide up on mobile, sidebar on desktop) -->
    <div id="cartPanel" class="bg-white border-t-2 lg:border-t-0 lg:border-l border-gray-100 w-full lg:w-[360px] flex flex-col max-h-[50vh] lg:max-h-full shadow-[0_-4px_20px_rgba(0,0,0,0.06)] lg:shadow-none">
      <!-- Cart Header -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
        <h3 class="text-sm font-bold text-gray-800">🛒 Keranjang</h3>
        <span id="cartCount" class="bg-primary-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
      </div>
      <!-- Cart Items -->
      <div class="flex-1 overflow-y-auto px-4 py-2 space-y-1" id="cartItems">
        <div class="text-center py-8 text-gray-300">
          <div class="text-4xl mb-2">🛒</div>
          <p class="text-xs">Ketuk menu untuk menambah</p>
        </div>
      </div>
      <!-- Cart Footer -->
      <div class="px-4 py-3 border-t-2 border-gray-100 bg-gray-50/80 space-y-3 safe-bottom">
        <div class="flex justify-between items-center">
          <span class="text-xs text-gray-400 font-medium">Total</span>
          <span id="cartTotal" class="text-xl font-extrabold text-primary-500">Rp 0</span>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <button id="btnCash" onclick="processPayment('Cash')" disabled
            class="py-3 bg-gradient-to-r from-green-500 to-emerald-500 text-white text-sm font-bold rounded-xl shadow-md shadow-green-500/30 disabled:opacity-40 disabled:shadow-none active:scale-95 transition-all">
            💵 Cash
          </button>
          <button id="btnQris" onclick="processPayment('QRIS')" disabled
            class="py-3 bg-gradient-to-r from-blue-500 to-cyan-500 text-white text-sm font-bold rounded-xl shadow-md shadow-blue-500/30 disabled:opacity-40 disabled:shadow-none active:scale-95 transition-all">
            📱 QRIS
          </button>
        </div>
        <button onclick="clearCart()" class="w-full py-2 text-xs font-semibold text-primary-500 bg-primary-50 rounded-lg hover:bg-primary-100 transition">
          🗑️ Kosongkan
        </button>
      </div>
    </div>
  </div>

  <!-- SUCCESS MODAL -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/50 z-[999] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm animate-popIn space-y-4 text-center">
      <div class="text-5xl">✅</div>
      <h3 class="text-lg font-bold text-gray-800">Pembayaran Berhasil!</h3>
      <p id="modalInfo" class="text-sm text-gray-500"></p>
      <!-- QRIS Upload -->
      <div id="qrisUploadSection" class="hidden">
        <div class="bg-blue-50 rounded-xl p-4 space-y-3">
          <p class="text-xs font-semibold text-blue-600">📷 Upload Bukti Transfer QRIS</p>
          <input type="file" id="qrisBukti" accept="image/*" capture="environment" class="hidden" onchange="handleQrisUpload(this)">
          <button onclick="document.getElementById('qrisBukti').click()"
            class="w-full py-3 bg-gradient-to-r from-blue-500 to-cyan-500 text-white text-sm font-bold rounded-xl active:scale-95 transition-all">
            📷 Ambil Foto Bukti
          </button>
        </div>
        <div id="qrisPreview" class="hidden mt-3">
          <img id="qrisPreviewImg" class="w-full max-h-40 object-contain rounded-xl border-2 border-gray-100">
          <p id="qrisUploadStatus" class="text-xs text-green-600 mt-1"></p>
        </div>
      </div>
      <!-- Buttons -->
      <div class="grid grid-cols-2 gap-2 pt-2">
        <button onclick="closeModal()" class="py-3 bg-gray-100 text-gray-600 text-sm font-semibold rounded-xl hover:bg-gray-200 transition">Tutup</button>
        <button onclick="printReceipt()" class="py-3 bg-primary-500 text-white text-sm font-bold rounded-xl hover:bg-primary-600 transition">🖨️ Cetak</button>
      </div>
    </div>
  </div>

  <!-- RECEIPT (print only) -->
  <div class="receipt-print hidden">
    <div style="text-align:center;border-bottom:1px dashed #000;padding-bottom:5px;margin-bottom:5px;">
      <strong>DIMSUM ENAK</strong><br>
      <span id="receiptBranch"><?= cabang ?></span><br>
      <span id="receiptDate"></span><br>
      <span>Kasir: <?= username ?></span>
    </div>
    <div id="receiptItems" style="border-bottom:1px dashed #000;padding-bottom:5px;margin-bottom:5px;"></div>
    <div style="font-weight:bold;display:flex;justify-content:space-between;"><span>TOTAL</span><span id="receiptTotal"></span></div>
    <div style="display:flex;justify-content:space-between;margin-top:3px;"><span>Bayar:</span><span id="receiptMethod"></span></div>
    <div style="text-align:center;margin-top:8px;font-size:10px;">================================<br>Terima kasih!<br>Selamat menikmati 🥟</div>
  </div>

  <script>
    var TOKEN = '<?= token ?>';
    var USERNAME = '<?= username ?>';
    var CABANG = '<?= cabang ?>';
    var menuData = [];
    var cart = [];
    var lastTransaction = null;

    document.addEventListener('DOMContentLoaded', function() { loadMenu(); });
    setInterval(loadMenu, 60000);

    // === MENU ===
    function loadMenu() {
      google.script.run.withSuccessHandler(function(data) { menuData = data; renderMenu(data); }).withFailureHandler(function(){}).getMenu();
    }
    function renderMenu(items) {
      var grid = document.getElementById('menuGrid');
      grid.innerHTML = '';
      items.forEach(function(item) {
        var img = (item.gambar && item.gambar.length > 5) ? '<img src="'+item.gambar+'" class="w-full h-16 sm:h-20 object-cover">' : '<div class="w-full h-16 sm:h-20 bg-gradient-to-br from-amber-100 to-orange-100 flex items-center justify-center text-2xl">🥟</div>';
        var card = document.createElement('div');
        card.className = 'bg-white rounded-xl overflow-hidden shadow-sm border-2 border-transparent hover:border-primary-500 hover:shadow-md active:scale-95 transition-all cursor-pointer';
        card.onclick = function() { addToCart(item); };
        card.innerHTML = img + '<div class="p-2"><p class="text-[11px] font-semibold text-gray-700 truncate">'+item.nama+'</p><p class="text-xs font-bold text-primary-500">Rp '+formatNumber(item.harga)+'</p></div>';
        grid.appendChild(card);
      });
    }
    function filterMenu() {
      var s = document.getElementById('searchMenu').value.toLowerCase();
      renderMenu(menuData.filter(function(i) { return i.nama.toLowerCase().indexOf(s) !== -1; }));
    }

    // === CART ===
    function addToCart(item) {
      var ex = cart.find(function(c){return c.id===item.id;});
      if(ex) ex.qty++; else cart.push({id:item.id,nama:item.nama,harga:item.harga,qty:1});
      renderCart(); showToast(item.nama+' +1');
    }
    function updateQty(id,d) {
      var item = cart.find(function(c){return c.id===id;});
      if(item){item.qty+=d; if(item.qty<=0) cart=cart.filter(function(c){return c.id!==id;});}
      renderCart();
    }
    function clearCart() { cart=[]; renderCart(); }
    function renderCart() {
      var container = document.getElementById('cartItems');
      var countEl = document.getElementById('cartCount');
      var totalEl = document.getElementById('cartTotal');
      var btnC = document.getElementById('btnCash');
      var btnQ = document.getElementById('btnQris');
      if(cart.length===0){
        container.innerHTML='<div class="text-center py-8 text-gray-300"><div class="text-4xl mb-2">🛒</div><p class="text-xs">Ketuk menu untuk menambah</p></div>';
        countEl.textContent='0'; totalEl.textContent='Rp 0'; btnC.disabled=true; btnQ.disabled=true; return;
      }
      var total=0,cnt=0,html='';
      cart.forEach(function(item){
        var sub=item.harga*item.qty; total+=sub; cnt+=item.qty;
        html+='<div class="flex items-center gap-2 py-2 border-b border-gray-50">'+
          '<div class="flex-1 min-w-0"><p class="text-xs font-semibold text-gray-700 truncate">'+item.nama+'</p><p class="text-[10px] text-gray-400">Rp '+formatNumber(item.harga)+' × '+item.qty+'</p></div>'+
          '<div class="flex items-center gap-1.5">'+
            '<button onclick="updateQty('+item.id+',-1)" class="w-6 h-6 rounded-md bg-red-50 text-red-500 text-sm font-bold flex items-center justify-center active:scale-90">−</button>'+
            '<span class="text-xs font-bold w-4 text-center">'+item.qty+'</span>'+
            '<button onclick="updateQty('+item.id+',1)" class="w-6 h-6 rounded-md bg-green-50 text-green-500 text-sm font-bold flex items-center justify-center active:scale-90">+</button>'+
          '</div></div>';
      });
      container.innerHTML=html; countEl.textContent=cnt; totalEl.textContent='Rp '+formatNumber(total); btnC.disabled=false; btnQ.disabled=false;
    }

    // === PAYMENT ===
    function processPayment(metode) {
      if(cart.length===0) return;
      var total=cart.reduce(function(s,i){return s+(i.harga*i.qty);},0);
      document.getElementById('btnCash').disabled=true;
      document.getElementById('btnQris').disabled=true;
      google.script.run.withSuccessHandler(function(result){
        if(result.success){
          lastTransaction={items:cart.slice(),total:total,metode:metode,waktu:result.waktu};
          document.getElementById('modalInfo').textContent='Total: Rp '+formatNumber(total)+' | '+metode+' | '+result.waktu;
          document.getElementById('successModal').classList.remove('hidden');
          var qs=document.getElementById('qrisUploadSection');
          if(metode==='QRIS') qs.classList.remove('hidden'); else qs.classList.add('hidden');
          document.getElementById('qrisPreview').classList.add('hidden');
          document.getElementById('qrisUploadStatus').textContent='';
          prepareReceipt(lastTransaction);
          cart=[]; renderCart();
        }
      }).withFailureHandler(function(err){
        alert('Gagal: '+(err.message||err));
        document.getElementById('btnCash').disabled=false;
        document.getElementById('btnQris').disabled=false;
      }).saveTransaction(cart,total,metode,USERNAME,CABANG);
    }

    // === QRIS UPLOAD ===
    function handleQrisUpload(input){
      if(!input.files||!input.files[0]) return;
      document.getElementById('qrisPreview').classList.remove('hidden');
      document.getElementById('qrisUploadStatus').textContent='⏳ Mengkompresi...';
      compressImage(input.files[0],800,0.6,function(b64){
        document.getElementById('qrisPreviewImg').src='data:image/jpeg;base64,'+b64;
        document.getElementById('qrisUploadStatus').textContent='⏳ Mengupload...';
        var fn='QRIS_'+CABANG+'_'+USERNAME+'_'+Date.now()+'.jpg';
        google.script.run.withSuccessHandler(function(r){
          document.getElementById('qrisUploadStatus').textContent=r.success?'✅ Berhasil diupload!':'❌ Gagal';
        }).withFailureHandler(function(){
          document.getElementById('qrisUploadStatus').textContent='❌ Error upload';
        }).uploadQrisBukti(b64,fn,USERNAME,CABANG);
      });
    }
    function compressImage(file,max,q,cb){
      var r=new FileReader();
      r.onload=function(e){
        var img=new Image();
        img.onload=function(){
          var c=document.createElement('canvas'),w=img.width,h=img.height;
          if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
          c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
          cb(c.toDataURL('image/jpeg',q).split(',')[1]);
        };img.src=e.target.result;
      };r.readAsDataURL(file);
    }

    // === RECEIPT ===
    function prepareReceipt(trx){
      document.getElementById('receiptDate').textContent=trx.waktu;
      document.getElementById('receiptTotal').textContent='Rp '+formatNumber(trx.total);
      document.getElementById('receiptMethod').textContent=trx.metode;
      var h='';trx.items.forEach(function(i){h+='<div style="display:flex;justify-content:space-between;margin:2px 0"><span>'+i.nama+' x'+i.qty+'</span><span>Rp '+formatNumber(i.harga*i.qty)+'</span></div>';});
      document.getElementById('receiptItems').innerHTML=h;
    }
    function printReceipt(){window.print();}

    // === MODAL ===
    function closeModal(){document.getElementById('successModal').classList.add('hidden');}

    // === NAV ===
    function goToOwner(){google.script.run.withSuccessHandler(function(u){window.top.location.href=u+'?page=owner&token='+TOKEN;}).getWebAppUrl();}
    function handleLogout(){google.script.run.withSuccessHandler(function(){google.script.run.withSuccessHandler(function(u){window.top.location.href=u;}).getWebAppUrl();}).logout(TOKEN);}

    // === UTILS ===
    function formatNumber(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
    function showToast(msg){
      var t=document.createElement('div');
      t.className='fixed bottom-20 lg:bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-xs font-semibold shadow-lg z-[9999] animate-slideUp';
      t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},1500);
    }
  </script>
</body>
</html>
