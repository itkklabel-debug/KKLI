<!-- PWA Install Banner (shared across pages) -->
<div id="pwaInstallBanner" class="pwa-install-banner">
  <span class="pwa-icon">🥟</span>
  <div class="pwa-text">
    <h4>Install Dimsum Enak</h4>
    <p>Tambahkan ke layar utama HP</p>
  </div>
  <button class="pwa-btn" onclick="installPWA()">Install</button>
  <button class="pwa-close" onclick="dismissPWA()">✕</button>
</div>

<script>
// === PWA INSTALL LOGIC ===
var deferredPrompt = null;

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner after 3 seconds
  setTimeout(function() {
    if (!localStorage.getItem('pwa_dismissed')) {
      var banner = document.getElementById('pwaInstallBanner');
      if (banner) banner.classList.add('show');
    }
  }, 3000);
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(result) {
      if (result.outcome === 'accepted') {
        var banner = document.getElementById('pwaInstallBanner');
        if (banner) banner.classList.remove('show');
      }
      deferredPrompt = null;
    });
  }
}

function dismissPWA() {
  var banner = document.getElementById('pwaInstallBanner');
  if (banner) banner.classList.remove('show');
  localStorage.setItem('pwa_dismissed', '1');
}

// Register service worker if available
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    // For GAS, we use a minimal inline SW approach
    var swCode = "self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request)); });";
    var blob = new Blob([swCode], {type: 'application/javascript'});
    var swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, {scope: '/'}).catch(function(){});
  });
}

// Inject manifest dynamically (GAS can't serve static files)
(function() {
  var manifest = {
    "name": "Dimsum Enak POS",

        "sizes": "512x512",
        "type": "image/svg+xml",
        "purpose": "any maskable"
      },
      {
        "src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='30' fill='%23e74c3c'/><text y='.82em' x='96' text-anchor='middle' font-size='120'>🥟</text></svg>",
        "sizes": "192x192",
        "type": "image/svg+xml",
        "purpose": "any maskable"
      }
    ]
  };
  var blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);
})();
</script>
