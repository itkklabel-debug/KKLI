<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('style'); ?>
  <style>
    body {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 50%, #f1c40f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #e74c3c, #f1c40f);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 5px;
    }
    .login-subtitle {
      color: #7f8c8d;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #ecf0f1;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
      box-sizing: border-box;
      outline: none;
    }
    .form-group input:focus {
      border-color: #e74c3c;
      box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
    }
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .error-msg {
      background: #fdeaea;
      color: #e74c3c;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 13px;
      display: none;
    }
    .footer-text {
      margin-top: 25px;
      color: #bdc3c7;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">🥟</div>
    <h1 class="login-title">Dimsum Enak</h1>
    <p class="login-subtitle">Point of Sale System</p>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Masukkan username" required autocomplete="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="btn-login" id="btnLogin">
        Masuk
      </button>
    </form>
    
    <p class="footer-text">© 2024 Dimsum Enak - All Rights Reserved</p>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const errorMsg = document.getElementById('errorMsg');
      
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Memproses...';
      
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            // Get the correct web app URL from server, then redirect
            google.script.run
              .withSuccessHandler(function(baseUrl) {
                var page = (result.role === 'owner') ? 'owner' : 'kasir';
                var url = baseUrl + '?page=' + page + '&token=' + result.token;
                // Use top.location for proper redirect out of iframe
                window.top.location.href = url;
              })
              .withFailureHandler(function() {
                // Fallback: try using google.script.host
                errorMsg.textContent = 'Redirect gagal. Silakan refresh halaman.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Masuk';
              })
              .getWebAppUrl();
          } else {
            errorMsg.textContent = result.message;
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Masuk';
          }
        })
        .withFailureHandler(function(err) {
          errorMsg.textContent = 'Terjadi kesalahan. Coba lagi.';
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Masuk';
        })
        .login(username, password);
    }
  </script>
</body>
</html>
