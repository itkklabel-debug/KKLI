<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <?!= include('style'); ?>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-500 via-primary-600 to-accent-400 flex items-center justify-center p-4">

  <div class="w-full max-w-sm animate-slideUp">
    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8 space-y-6">
      <!-- Logo -->
      <div class="text-center space-y-2">
        <div class="w-20 h-20 mx-auto bg-gradient-to-br from-primary-500 to-accent-400 rounded-full flex items-center justify-center shadow-lg">
          <span class="text-4xl">🥟</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Dimsum Enak</h1>
        <p class="text-sm text-gray-400">Point of Sale System</p>
      </div>

      <!-- Error -->
      <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 text-center"></div>

      <!-- Form -->
      <form onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Username</label>
          <input type="text" id="username" placeholder="Masukkan username" required autocomplete="off"
            class="w-full px-4 py-3.5 bg-gray-50 border-2 border-gray-100 rounded-xl text-sm font-medium text-gray-800 placeholder-gray-300 focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-500/10 transition-all outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Password</label>
          <input type="password" id="password" placeholder="Masukkan password" required
            class="w-full px-4 py-3.5 bg-gray-50 border-2 border-gray-100 rounded-xl text-sm font-medium text-gray-800 placeholder-gray-300 focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-500/10 transition-all outline-none">
        </div>
        <button type="submit" id="btnLogin"
          class="w-full py-4 bg-gradient-to-r from-primary-500 to-primary-600 text-white font-bold rounded-xl text-sm shadow-lg shadow-primary-500/30 hover:shadow-xl hover:shadow-primary-500/40 active:scale-[0.98] transition-all disabled:opacity-60 disabled:cursor-not-allowed disabled:active:scale-100">
          Masuk
        </button>
      </form>

      <!-- Footer -->
      <p class="text-center text-xs text-gray-300 pt-2">&copy; 2024 Dimsum Enak</p>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var btn = document.getElementById('btnLogin');
      var errorMsg = document.getElementById('errorMsg');

      errorMsg.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Memproses...';

      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            google.script.run
              .withSuccessHandler(function(baseUrl) {
                var page = (result.role === 'owner') ? 'owner' : 'kasir';
                window.top.location.href = baseUrl + '?page=' + page + '&token=' + result.token;
              })
              .withFailureHandler(function() {
                errorMsg.textContent = 'Redirect gagal. Silakan refresh.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Masuk';
              })
              .getWebAppUrl();
          } else {
            errorMsg.textContent = result.message;
            errorMsg.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Masuk';
          }
        })
        .withFailureHandler(function() {
          errorMsg.textContent = 'Terjadi kesalahan. Coba lagi.';
          errorMsg.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Masuk';
        })
        .login(username, password);
    }
  </script>
</body>
</html>
