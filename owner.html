  <!-- TAB CONTENT AREA -->
  <div id="tab-dashboard" class="tab-page px-4 pt-4 space-y-4">

    <!-- Summary Cards -->

        <div><p class="text-[10px] text-gray-400 font-medium">7 Hari</p><p id="omsetWeek" class="text-lg font-extrabold text-gray-800">Rp 0</p><p id="trxWeek" class="text-[10px] text-gray-400">0 trx</p></div>
      </div>
      <div class="bg-white rounded-2xl p-4 flex items-center gap-3 shadow-sm">

        <div><p class="text-[10px] text-gray-400 font-medium">30 Hari</p><p id="omsetMonth" class="text-lg font-extrabold text-gray-800">Rp 0</p><p id="trxMonth" class="text-[10px] text-gray-400">0 trx</p></div>
      </div>
    </div>
    <!-- Charts -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
      <div class="lg:col-span-2 bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex justify-between items-center mb-3">
          <h4 class="text-xs font-bold text-gray-700">📈 Grafik Penjualan</h4>
          <select id="chartPeriod" onchange="loadChartByPeriod()" class="text-[11px] font-semibold border border-gray-200 rounded-lg px-2 py-1 outline-none">
            <option value="today">Hari Ini</option><option value="7days" selected>7 Hari</option><option value="30days">30 Hari</option>

        <canvas id="chartSales" height="140"></canvas>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <h4 class="text-xs font-bold text-gray-700 mb-3">💳 Metode Bayar</h4>
        <canvas id="chartPayment" height="140"></canvas>
      </div>

  </div>


  <!-- LAPORAN TAB -->
  <div id="tab-laporan" class="tab-page hidden px-4 pt-4 space-y-4">
    <div class="flex flex-wrap gap-2 items-center">
      <select id="filterPeriod" onchange="loadReport()" class="text-xs font-semibold border-2 border-gray-100 rounded-xl px-3 py-2.5 outline-none focus:border-primary-500">
        <option value="today">Hari Ini</option><option value="7days" selected>7 Hari</option><option value="30days">30 Hari</option>
      </select>
      <select id="filterCabang" onchange="loadReport()" class="text-xs font-semibold border-2 border-gray-100 rounded-xl px-3 py-2.5 outline-none focus:border-primary-500">
        <option value="semua">Semua Cabang</option>
      </select>
      <button onclick="exportExcel()" class="text-xs font-bold bg-green-500 text-white px-3 py-2.5 rounded-xl active:scale-95 transition">📥 Excel</button>
      <button onclick="exportPDF()" class="text-xs font-bold bg-primary-500 text-white px-3 py-2.5 rounded-xl active:scale-95 transition">📄 PDF</button>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="bg-white rounded-2xl p-4 shadow-sm"><h4 class="text-xs font-bold text-gray-700 mb-2">👤 Per Kasir</h4><div id="reportKasir" class="space-y-1"></div></div>
      <div class="bg-white rounded-2xl p-4 shadow-sm"><h4 class="text-xs font-bold text-gray-700 mb-2">🏪 Per Cabang</h4><div id="reportCabang" class="space-y-1"></div></div>
    </div>
    <div class="bg-white rounded-2xl p-4 shadow-sm overflow-x-auto">
      <h4 class="text-xs font-bold text-gray-700 mb-3">📋 Detail Transaksi</h4>
      <table class="w-full text-[11px] min-w-[550px]">
        <thead><tr class="bg-gray-50 text-gray-500"><th class="text-left py-2 px-2 rounded-l-lg">Waktu</th><th class="text-left py-2 px-2">Items</th><th class="text-left py-2 px-2">Total</th><th class="text-left py-2 px-2">Metode</th><th class="text-left py-2 px-2">Kasir</th><th class="text-left py-2 px-2 rounded-r-lg">Cabang</th></tr></thead>
        <tbody id="trxTableBody"><tr><td colspan="6" class="text-center py-6 text-gray-300">Memuat...</td></tr></tbody>
      </table>
    </div>
  </div>


  <!-- MENU MANAGEMENT TAB -->
  <div id="tab-menu" class="tab-page hidden px-4 pt-4 space-y-4">
    <div class="flex justify-between items-center">
      <h3 class="text-sm font-bold text-gray-800">🍽️ Kelola Menu</h3>
      <button onclick="showAddMenu()" class="text-xs font-bold bg-primary-500 text-white px-4 py-2 rounded-xl active:scale-95 transition">+ Tambah</button>
    </div>
    <div id="addMenuForm" class="hidden bg-white rounded-2xl p-4 shadow-sm space-y-3">
      <h4 class="text-xs font-bold text-gray-700">Tambah Menu Baru</h4>
      <div class="grid grid-cols-2 gap-2">
        <input type="text" id="menuNama" placeholder="Nama menu" class="text-xs border-2 border-gray-100 rounded-xl px-3 py-2.5 outline-none focus:border-primary-500">
        <input type="number" id="menuHarga" placeholder="Harga" class="text-xs border-2 border-gray-100 rounded-xl px-3 py-2.5 outline-none focus:border-primary-500">
      </div>
      <input type="file" id="menuGambar" accept="image/*" class="text-xs">
      <div class="flex gap-2">
        <button onclick="saveMenu()" class="text-xs font-bold bg-green-500 text-white px-4 py-2 rounded-xl">💾 Simpan</button>
        <button onclick="hideAddMenu()" class="text-xs font-semibold bg-gray-100 text-gray-600 px-4 py-2 rounded-xl">Batal</button>
      </div>
    </div>
    <div id="menuList" class="space-y-2"></div>
  </div>

  <!-- USERS TAB -->
  <div id="tab-users" class="tab-page hidden px-4 pt-4 space-y-4">
    <div class="flex justify-between items-center">
      <h3 class="text-sm font-bold text-gray-800">👥 Kelola Pengguna</h3>
      <button onclick="showAddUser()" class="text-xs font-bold bg-primary-500 text-white px-4 py-2 rounded-xl active:scale-95 transition">+ Tambah</button>
    </div>
    <div id="addUserForm" class="hidden bg-white rounded-2xl p-4 shadow-sm space-y-3">
      <h4 class="text-xs font-bold text-gray-700">Tambah Pengguna</h4>
      <div class="grid grid-cols-2 gap-2">
        <input type="text" id="newUsername" placeholder="Username" class="text-xs border-2 border-gray-100 rounded-xl px-3 py-2.5 outline-none focus:border-primary-500">
        <input type="password" id="newPassword" placeholder="Password" class="text-xs border-2 border-gray-100 rounded-xl px-3 py-2.5 outline-none focus:border-primary-500">
        <select id="newRole" class="text-xs border-2 border-gray-100 rounded-xl px-3 py-2.5 outline-none"><option value="kasir">Kasir</option><option value="owner">Owner</option></select>
        <input type="text" id="newCabang" placeholder="Cabang" class="text-xs border-2 border-gray-100 rounded-xl px-3 py-2.5 outline-none focus:border-primary-500">
      </div>
      <div class="flex gap-2">
        <button onclick="saveUser()" class="text-xs font-bold bg-green-500 text-white px-4 py-2 rounded-xl">💾 Simpan</button>
        <button onclick="hideAddUser()" class="text-xs font-semibold bg-gray-100 text-gray-600 px-4 py-2 rounded-xl">Batal</button>
      </div>
    </div>
    <div id="userList" class="space-y-2"></div>
  </div>


  <!-- BOTTOM NAVIGATION BAR (Mobile App Style) -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 shadow-[0_-2px_20px_rgba(0,0,0,0.06)] z-50 safe-bottom">
    <div class="flex justify-around items-center py-2 max-w-lg mx-auto">
      <button onclick="showTab('dashboard')" id="nav-dashboard" class="nav-btn nav-active flex flex-col items-center gap-0.5 px-3 py-1">
        <span class="text-lg">📊</span><span class="text-[9px] font-semibold">Dashboard</span>
      </button>
      <button onclick="showTab('laporan')" id="nav-laporan" class="nav-btn flex flex-col items-center gap-0.5 px-3 py-1">
        <span class="text-lg">📋</span><span class="text-[9px] font-semibold">Laporan</span>
      </button>
      <button onclick="showTab('menu')" id="nav-menu" class="nav-btn flex flex-col items-center gap-0.5 px-3 py-1">
        <span class="text-lg">🍽️</span><span class="text-[9px] font-semibold">Menu</span>
      </button>
      <button onclick="showTab('users')" id="nav-users" class="nav-btn flex flex-col items-center gap-0.5 px-3 py-1">
        <span class="text-lg">👥</span><span class="text-[9px] font-semibold">User</span>
      </button>
    </div>
  </nav>

  <style>
    .nav-btn { color: #9ca3af; transition: all 0.2s; }
    .nav-active { color: #e74c3c !important; }
    .nav-btn:active { transform: scale(0.9); }
  </style>


  <script>
    var TOKEN = '<?= token ?>';
    var salesChart = null, paymentChart = null;

    document.addEventListener('DOMContentLoaded', function(){
      loadDashboard(); loadCabangFilter(); loadReport(); loadMenuList(); loadUsers();
    });
    setInterval(function(){ if(!document.getElementById('tab-dashboard').classList.contains('hidden')) loadDashboard(); }, 10000);

    // === TABS ===
    function showTab(tab){
      document.querySelectorAll('.tab-page').forEach(function(el){el.classList.add('hidden');});
      document.getElementById('tab-'+tab).classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach(function(el){el.classList.remove('nav-active');});
      document.getElementById('nav-'+tab).classList.add('nav-active');
      if(tab==='dashboard') loadDashboard();
      if(tab==='laporan') loadReport();
      if(tab==='menu') loadMenuList();
      if(tab==='users') loadUsers();
    }

    // === DASHBOARD ===
    function loadDashboard(){
      google.script.run.withSuccessHandler(function(d){
        document.getElementById('omsetToday').textContent='Rp '+formatNumber(d.today);
        document.getElementById('trxToday').textContent=d.todayTrx+' trx';
        document.getElementById('omsetWeek').textContent='Rp '+formatNumber(d.week);
        document.getElementById('trxWeek').textContent=d.weekTrx+' trx';
        document.getElementById('omsetMonth').textContent='Rp '+formatNumber(d.month);
        document.getElementById('trxMonth').textContent=d.monthTrx+' trx';
      }).getDashboardSummary();
      loadChartByPeriod();
    }
    function loadChartByPeriod(){
      var p=document.getElementById('chartPeriod').value;
      google.script.run.withSuccessHandler(function(d){ renderSalesChart(d.perHari,p); renderPaymentChart(d.perMetode); }).getReportData(p,'semua');
    }
    function renderSalesChart(perHari,period){
      if(salesChart) salesChart.destroy();
      salesChart = new Chart(document.getElementById('chartSales').getContext('2d'),{
        type:'line',
        data:{labels:Object.keys(perHari),datasets:[{label:'Omset',data:Object.values(perHari),borderColor:'#e74c3c',backgroundColor:'rgba(231,76,60,0.08)',borderWidth:2.5,fill:true,tension:0.4,pointRadius:4,pointBackgroundColor:'#e74c3c'}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return 'Rp '+formatNumber(v);},font:{size:9}}}}}
      });
    }
    function renderPaymentChart(perMetode){
      if(paymentChart) paymentChart.destroy();
      paymentChart = new Chart(document.getElementById('chartPayment').getContext('2d'),{
        type:'doughnut',
        data:{labels:Object.keys(perMetode),datasets:[{data:Object.values(perMetode),backgroundColor:['#27ae60','#2980b9'],borderWidth:0}]},
        options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}}
      });
    }


    // === REPORTS ===
    function loadCabangFilter(){
      google.script.run.withSuccessHandler(function(list){
        var sel=document.getElementById('filterCabang');
        list.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
      }).getCabangList();
    }
    function loadReport(){
      var period=document.getElementById('filterPeriod').value;
      var cabang=document.getElementById('filterCabang').value;
      google.script.run.withSuccessHandler(function(d){ renderReportKasir(d.perKasir); renderReportCabang(d.perCabang); }).getReportData(period,cabang);
      google.script.run.withSuccessHandler(function(rows){ renderTransactionTable(rows); }).getTransactionDetail(period,cabang);
    }
    function renderReportKasir(pk){
      var c=document.getElementById('reportKasir');
      if(!Object.keys(pk).length){c.innerHTML='<p class="text-xs text-gray-300 text-center py-4">Belum ada data</p>';return;}
      var h='';Object.entries(pk).sort(function(a,b){return b[1]-a[1];}).forEach(function(e){
        h+='<div class="flex justify-between py-1.5 border-b border-gray-50 text-xs"><span class="text-gray-600">'+e[0]+'</span><span class="font-bold text-primary-500">Rp '+formatNumber(e[1])+'</span></div>';
      });c.innerHTML=h;
    }
    function renderReportCabang(pc){
      var c=document.getElementById('reportCabang');
      if(!Object.keys(pc).length){c.innerHTML='<p class="text-xs text-gray-300 text-center py-4">Belum ada data</p>';return;}
      var h='';Object.entries(pc).sort(function(a,b){return b[1]-a[1];}).forEach(function(e){
        h+='<div class="flex justify-between py-1.5 border-b border-gray-50 text-xs"><span class="text-gray-600">'+e[0]+'</span><span class="font-bold text-primary-500">Rp '+formatNumber(e[1])+'</span></div>';
      });c.innerHTML=h;
    }
    var currentTransactions=[];
    function renderTransactionTable(rows){
      currentTransactions=rows||[];
      var tb=document.getElementById('trxTableBody');
      if(!rows||!rows.length){tb.innerHTML='<tr><td colspan="6" class="text-center py-6 text-gray-300 text-xs">Belum ada transaksi</td></tr>';return;}
      var h='';rows.forEach(function(r){
        var mc=r.metode==='Cash'?'bg-green-50 text-green-600':'bg-blue-50 text-blue-600';
        h+='<tr class="border-b border-gray-50"><td class="py-2 px-2">'+r.waktu+'</td><td class="py-2 px-2">'+r.items+'</td><td class="py-2 px-2 font-bold text-primary-500">Rp '+formatNumber(r.total)+'</td><td class="py-2 px-2"><span class="'+mc+' text-[9px] font-bold px-1.5 py-0.5 rounded-md">'+r.metode+'</span></td><td class="py-2 px-2">'+r.kasir+'</td><td class="py-2 px-2">'+r.cabang+'</td></tr>';
      });tb.innerHTML=h;
    }


    // === EXPORT ===
    function exportExcel(){
      var period=document.getElementById('filterPeriod').value,cabang=document.getElementById('filterCabang').value;
      if(currentTransactions&&currentTransactions.length>0){doExportExcel(currentTransactions,period,cabang);}
      else{google.script.run.withSuccessHandler(function(rows){if(!rows||!rows.length){alert('Tidak ada data.');return;}currentTransactions=rows;renderTransactionTable(rows);doExportExcel(rows,period,cabang);}).getTransactionDetail(period,cabang);}
    }
    function doExportExcel(data,period,cabang){
      var csv='No,Waktu,Items,Total,Metode,Kasir,Cabang\n';
      data.forEach(function(r,i){csv+=(i+1)+','+r.waktu+',"'+(r.items||'').replace(/"/g,'""')+'",'+r.total+','+r.metode+','+r.kasir+','+r.cabang+'\n';});
      var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
      var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Laporan_'+period+'_'+cabang+'_'+new Date().toISOString().split('T')[0]+'.csv';document.body.appendChild(a);a.click();a.remove();
    }
    function exportPDF(){
      var period=document.getElementById('filterPeriod').value,cabang=document.getElementById('filterCabang').value;
      if(currentTransactions&&currentTransactions.length>0){doExportPDF(currentTransactions,period,cabang);}
      else{google.script.run.withSuccessHandler(function(rows){if(!rows||!rows.length){alert('Tidak ada data.');return;}currentTransactions=rows;renderTransactionTable(rows);doExportPDF(rows,period,cabang);}).getTransactionDetail(period,cabang);}
    }
    function doExportPDF(data,period,cabang){
      var pl=period==='today'?'Hari Ini':period==='7days'?'7 Hari':'30 Hari';
      var gt=data.reduce(function(s,r){return s+r.total;},0);
      var w=window.open('','_blank');
      var h='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Laporan</title><style>body{font:12px Arial;padding:20px;color:#2c3e50}h2{color:#e74c3c;margin:0 0 5px}table{width:100%;border-collapse:collapse;margin-top:10px}th{background:#e74c3c;color:#fff;padding:6px;text-align:left;font-size:10px}td{padding:5px;border-bottom:1px solid #eee;font-size:10px}tr:nth-child(even){background:#f9f9f9}.t{font-weight:bold;background:#fef5e7!important}</style></head><body>';
      h+='<h2>🥟 Dimsum Enak - Laporan</h2><p style="color:#888;font-size:10px">Periode: '+pl+' | Cabang: '+cabang+' | '+new Date().toLocaleString("id-ID")+'</p>';
      h+='<table><thead><tr><th>No</th><th>Waktu</th><th>Items</th><th>Total</th><th>Metode</th><th>Kasir</th><th>Cabang</th></tr></thead><tbody>';
      data.forEach(function(r,i){h+='<tr><td>'+(i+1)+'</td><td>'+r.waktu+'</td><td>'+r.items+'</td><td>Rp '+formatNumber(r.total)+'</td><td>'+r.metode+'</td><td>'+r.kasir+'</td><td>'+r.cabang+'</td></tr>';});
      h+='<tr class="t"><td colspan="3">TOTAL ('+data.length+' trx)</td><td colspan="4">Rp '+formatNumber(gt)+'</td></tr></tbody></table>';
      h+='<script>setTimeout(function(){window.print();},500)<\/script></body></html>';
      w.document.write(h);w.document.close();
    }


    // === MENU MANAGEMENT ===
    function showAddMenu(){document.getElementById('addMenuForm').classList.remove('hidden');}
    function hideAddMenu(){document.getElementById('addMenuForm').classList.add('hidden');}
    function saveMenu(){
      var nama=document.getElementById('menuNama').value.trim(),harga=parseInt(document.getElementById('menuHarga').value),fi=document.getElementById('menuGambar');
      if(!nama||!harga){alert('Nama & harga wajib!');return;}
      if(fi.files.length>0){var r=new FileReader();r.onload=function(e){var b=e.target.result.split(',')[1];google.script.run.withSuccessHandler(function(res){if(res.success){hideAddMenu();loadMenuList();clearMenuForm();}}).addMenu(nama,harga,b,fi.files[0].name);};r.readAsDataURL(fi.files[0]);}
      else{google.script.run.withSuccessHandler(function(res){if(res.success){hideAddMenu();loadMenuList();clearMenuForm();}}).addMenu(nama,harga,'','');}
    }
    function clearMenuForm(){document.getElementById('menuNama').value='';document.getElementById('menuHarga').value='';document.getElementById('menuGambar').value='';}
    function loadMenuList(){
      google.script.run.withSuccessHandler(function(data){
        var c=document.getElementById('menuList');
        if(!data.length){c.innerHTML='<p class="text-xs text-gray-300 text-center py-8">Belum ada menu</p>';return;}
        var h='';data.forEach(function(item){
          var img=(item.gambar&&item.gambar.length>5)?'<img src="'+item.gambar+'" class="w-10 h-10 rounded-lg object-cover">':'<div class="w-10 h-10 rounded-lg bg-amber-50 flex items-center justify-center">🥟</div>';
          var st=item.aktif?'Nonaktifkan':'Aktifkan';
          h+='<div class="bg-white rounded-xl p-3 flex items-center justify-between shadow-sm"><div class="flex items-center gap-3">'+img+'<div><p class="text-xs font-semibold text-gray-700">'+item.nama+'</p><p class="text-[10px] font-bold text-primary-500">Rp '+formatNumber(item.harga)+'</p></div></div><div class="flex gap-1.5"><button onclick="toggleMenuItem('+item.id+','+(!item.aktif)+')" class="text-[10px] font-semibold bg-blue-50 text-blue-600 px-2 py-1 rounded-md">'+st+'</button><button onclick="deleteMenuItem('+item.id+')" class="text-[10px] font-semibold bg-red-50 text-red-500 px-2 py-1 rounded-md">Hapus</button></div></div>';
        });c.innerHTML=h;
      }).getAllMenu();
    }
    function toggleMenuItem(id,aktif){google.script.run.withSuccessHandler(function(){loadMenuList();}).toggleMenu(id,aktif);}
    function deleteMenuItem(id){if(confirm('Hapus menu ini?'))google.script.run.withSuccessHandler(function(){loadMenuList();}).deleteMenu(id);}

    // === USER MANAGEMENT ===
    function showAddUser(){document.getElementById('addUserForm').classList.remove('hidden');}
    function hideAddUser(){document.getElementById('addUserForm').classList.add('hidden');}
    function saveUser(){
      var u=document.getElementById('newUsername').value.trim(),p=document.getElementById('newPassword').value,r=document.getElementById('newRole').value,c=document.getElementById('newCabang').value.trim();
      if(!u||!p||!c){alert('Semua field wajib!');return;}
      google.script.run.withSuccessHandler(function(res){if(res.success){hideAddUser();loadUsers();document.getElementById('newUsername').value='';document.getElementById('newPassword').value='';document.getElementById('newCabang').value='';}else{alert(res.message);}}).addUser(u,p,r,c);
    }
    function loadUsers(){
      google.script.run.withSuccessHandler(function(data){
        var c=document.getElementById('userList');var h='';
        data.forEach(function(u){
          h+='<div class="bg-white rounded-xl p-3 flex items-center justify-between shadow-sm"><div class="flex items-center gap-3"><div class="w-9 h-9 rounded-full bg-gradient-to-br from-primary-500 to-accent-400 flex items-center justify-center text-white text-xs font-bold">'+u.username.charAt(0).toUpperCase()+'</div><div><p class="text-xs font-semibold text-gray-700">'+u.username+'</p><p class="text-[10px] text-gray-400">'+u.role+' • '+u.cabang+'</p></div></div><button onclick="deleteUserItem(\''+u.username+'\')" class="text-[10px] font-semibold bg-red-50 text-red-500 px-2 py-1 rounded-md">Hapus</button></div>';
        });c.innerHTML=h;
      }).getUsers();
    }
    function deleteUserItem(u){if(confirm('Hapus user '+u+'?'))google.script.run.withSuccessHandler(function(){loadUsers();}).deleteUser(u);}

    // === NAVIGATION ===
    function goToKasir(){google.script.run.withSuccessHandler(function(u){window.top.location.href=u+'?page=kasir&token='+TOKEN;}).getWebAppUrl();}
    function handleLogout(){google.script.run.withSuccessHandler(function(){google.script.run.withSuccessHandler(function(u){window.top.location.href=u;}).getWebAppUrl();}).logout(TOKEN);}
    function formatNumber(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
  </script>
