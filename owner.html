  <script>
    const TOKEN = '<?= token ?>';
    let salesChart = null;
    let paymentChart = null;

    document.addEventListener('DOMContentLoaded', function() {
      loadDashboard();
      loadCabangFilter();
      loadReport();
      loadMenuList();
      loadUsers();
    });

    // Auto refresh every 10 seconds
    setInterval(function() {
      const activeTab = document.querySelector('.tab-content.active');
      if (activeTab.id === 'tab-dashboard') loadDashboard();
    }, 10000);

    // === TABS ===
    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
      document.querySelectorAll('.tab-btn').forEach(function(el) { el.classList.remove('active'); });
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');

      if (tab === 'dashboard') loadDashboard();
      if (tab === 'laporan') loadReport();
      if (tab === 'menu-mgmt') loadMenuList();
      if (tab === 'users') loadUsers();
    }

    // === DASHBOARD ===
    function loadDashboard() {
      google.script.run
        .withSuccessHandler(function(data) {
          document.getElementById('omsetToday').textContent = 'Rp ' + formatNumber(data.today);
          document.getElementById('trxToday').textContent = data.todayTrx + ' transaksi';
          document.getElementById('omsetWeek').textContent = 'Rp ' + formatNumber(data.week);
          document.getElementById('trxWeek').textContent = data.weekTrx + ' transaksi';
          document.getElementById('omsetMonth').textContent = 'Rp ' + formatNumber(data.month);
          document.getElementById('trxMonth').textContent = data.monthTrx + ' transaksi';
        })
        .getDashboardSummary();

      // Load chart data
      google.script.run
        .withSuccessHandler(function(data) {
          renderSalesChart(data.perHari);
          renderPaymentChart(data.perMetode);
        })
        .getReportData('7days', 'semua');
    }

    function renderSalesChart(perHari) {
      const labels = Object.keys(perHari);
      const values = Object.values(perHari);

      if (salesChart) salesChart.destroy();
      const ctx = document.getElementById('chartSales').getContext('2d');
      salesChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Omset',
            data: values,
            borderColor: '#e74c3c',
            backgroundColor: 'rgba(231,76,60,0.1)',
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 5,
            pointBackgroundColor: '#e74c3c'
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { callback: function(v) { return 'Rp ' + formatNumber(v); } } }
          }
        }
      });
    }

    function renderPaymentChart(perMetode) {
      if (paymentChart) paymentChart.destroy();
      const ctx = document.getElementById('chartPayment').getContext('2d');
      paymentChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: Object.keys(perMetode),
          datasets: [{
            data: Object.values(perMetode),
            backgroundColor: ['#27ae60', '#2980b9'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom' } }
        }
      });
    }

    // === REPORTS ===
    function loadCabangFilter() {
      google.script.run
        .withSuccessHandler(function(list) {
          const sel = document.getElementById('filterCabang');
          list.forEach(function(c) {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            sel.appendChild(opt);
          });
        })
        .getCabangList();
    }

    function loadReport() {
      const period = document.getElementById('filterPeriod').value;
      const cabang = document.getElementById('filterCabang').value;

      google.script.run
        .withSuccessHandler(function(data) {
          renderReportKasir(data.perKasir);
          renderReportCabang(data.perCabang);
        })
        .getReportData(period, cabang);
    }

    function renderReportKasir(perKasir) {
      const container = document.getElementById('reportKasir');
      if (Object.keys(perKasir).length === 0) {
        container.innerHTML = '<p class="loading-text">Belum ada data</p>';
        return;
      }
      let html = '';
      Object.entries(perKasir).sort(function(a,b) { return b[1]-a[1]; }).forEach(function(entry) {
        html += '<div class="report-item"><span class="report-item-name">' + entry[0] + '</span><span class="report-item-value">Rp ' + formatNumber(entry[1]) + '</span></div>';
      });
      container.innerHTML = html;
    }

    function renderReportCabang(perCabang) {
      const container = document.getElementById('reportCabang');
      if (Object.keys(perCabang).length === 0) {
        container.innerHTML = '<p class="loading-text">Belum ada data</p>';
        return;
      }
      let html = '';
      Object.entries(perCabang).sort(function(a,b) { return b[1]-a[1]; }).forEach(function(entry) {
        html += '<div class="report-item"><span class="report-item-name">' + entry[0] + '</span><span class="report-item-value">Rp ' + formatNumber(entry[1]) + '</span></div>';
      });
      container.innerHTML = html;
    }


    // === MENU MANAGEMENT ===
    function showAddMenu() { document.getElementById('addMenuForm').style.display = 'block'; }
    function hideAddMenu() { document.getElementById('addMenuForm').style.display = 'none'; }

    function saveMenu() {
      const nama = document.getElementById('menuNama').value.trim();
      const harga = parseInt(document.getElementById('menuHarga').value);
      const fileInput = document.getElementById('menuGambar');

      if (!nama || !harga) { alert('Nama dan harga wajib diisi!'); return; }

      if (fileInput.files.length > 0) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const base64 = e.target.result.split(',')[1];
          const filename = fileInput.files[0].name;
          google.script.run
            .withSuccessHandler(function(res) {
              if (res.success) { hideAddMenu(); loadMenuList(); clearMenuForm(); }
            })
            .addMenu(nama, harga, base64, filename);
        };
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success) { hideAddMenu(); loadMenuList(); clearMenuForm(); }
          })
          .addMenu(nama, harga, '', '');
      }
    }

    function clearMenuForm() {
      document.getElementById('menuNama').value = '';
      document.getElementById('menuHarga').value = '';
      document.getElementById('menuGambar').value = '';
    }

    function loadMenuList() {
      google.script.run
        .withSuccessHandler(function(data) {
          const container = document.getElementById('menuList');
          if (data.length === 0) {
            container.innerHTML = '<p class="loading-text">Belum ada menu</p>';
            return;
          }
          let html = '';
          data.forEach(function(item) {
            const imgHtml = (item.gambar && item.gambar.length > 5)
              ? '<img src="' + item.gambar + '">'
              : '🥟';
            const statusText = item.aktif ? 'Nonaktifkan' : 'Aktifkan';
            html += '<div class="menu-mgmt-item">' +
              '<div class="menu-mgmt-item-left">' +
                '<div class="menu-mgmt-img">' + imgHtml + '</div>' +
                '<div><div class="menu-mgmt-name">' + item.nama + '</div><div class="menu-mgmt-price">Rp ' + formatNumber(item.harga) + '</div></div>' +
              '</div>' +
              '<div class="menu-mgmt-actions">' +
                '<button class="btn-sm btn-toggle" onclick="toggleMenuItem(' + item.id + ',' + !item.aktif + ')">' + statusText + '</button>' +
                '<button class="btn-sm btn-delete" onclick="deleteMenuItem(' + item.id + ')">Hapus</button>' +
              '</div>' +
            '</div>';
          });
          container.innerHTML = html;
        })
        .getAllMenu();
    }

    function toggleMenuItem(id, aktif) {
      google.script.run.withSuccessHandler(function() { loadMenuList(); }).toggleMenu(id, aktif);
    }

    function deleteMenuItem(id) {
      if (confirm('Yakin hapus menu ini?')) {
        google.script.run.withSuccessHandler(function() { loadMenuList(); }).deleteMenu(id);
      }
    }

    // === USER MANAGEMENT ===
    function showAddUser() { document.getElementById('addUserForm').style.display = 'block'; }
    function hideAddUser() { document.getElementById('addUserForm').style.display = 'none'; }

    function saveUser() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const role = document.getElementById('newRole').value;
      const cabang = document.getElementById('newCabang').value.trim();

      if (!username || !password || !cabang) { alert('Semua field wajib diisi!'); return; }

      google.script.run
        .withSuccessHandler(function(res) {
          if (res.success) {
            hideAddUser();
            loadUsers();
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('newCabang').value = '';
          } else {
            alert(res.message);
          }
        })
        .addUser(username, password, role, cabang);
    }

    function loadUsers() {
      google.script.run
        .withSuccessHandler(function(data) {
          const container = document.getElementById('userList');
          let html = '';
          data.forEach(function(user) {
            html += '<div class="user-item">' +
              '<div class="user-item-info">' +
                '<div class="user-avatar">' + user.username.charAt(0).toUpperCase() + '</div>' +
                '<div><div class="user-name">' + user.username + '</div><div class="user-meta">' + user.role + ' • ' + user.cabang + '</div></div>' +
              '</div>' +
              '<button class="btn-sm btn-delete" onclick="deleteUserItem(\'' + user.username + '\')">Hapus</button>' +
            '</div>';
          });
          container.innerHTML = html;
        })
        .getUsers();
    }

    function deleteUserItem(username) {
      if (confirm('Yakin hapus user ' + username + '?')) {
        google.script.run.withSuccessHandler(function() { loadUsers(); }).deleteUser(username);
      }
    }

    // === NAVIGATION ===
    function goToKasir() {
      const baseUrl = window.location.href.split('?')[0];
      window.top.location.href = baseUrl + '?page=kasir&token=' + TOKEN;
    }

    function handleLogout() {
      google.script.run
        .withSuccessHandler(function() {
          const baseUrl = window.location.href.split('?')[0];
          window.top.location.href = baseUrl;
        })
        .logout(TOKEN);
    }

    // === UTILITIES ===
    function formatNumber(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }
  </script>
</body>
</html>
